default:
  tags:
    - ubmcluster

stages:
  - build
  - review

build-cr-cli:
  stage: build
  image: oven/bun:1
  script:
    - |
      if [ -d "$CI_PROJECT_DIR/cr-cli" ] && [ -f "$CI_PROJECT_DIR/cr-cli/build.sh" ]; then
        PROJECT_ROOT="$CI_PROJECT_DIR/cr-cli"
      else
        PROJECT_ROOT="$CI_PROJECT_DIR"
      fi
      echo "Using project root: $PROJECT_ROOT"
      cd "$PROJECT_ROOT"
      bash build.sh
  artifacts:
    paths:
      - cr-cli-*.tar.gz
      - dist/cr
      - dist/cr.exe
      - cr-cli/cr-cli-*.tar.gz
      - cr-cli/dist/cr
      - cr-cli/dist/cr.exe
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

cr-review:
  stage: review
  image: oven/bun:1
  needs:
    - job: build-cr-cli
      artifacts: true
  variables:
    CR_BIN_DIR: "$CI_PROJECT_DIR/.cr-bin"
    OPENAI_API_URL: "https://codeassist.cr.otxlab.net/v1"
    OPENAI_MODEL: "gpt-4o"
    USE_CUSTOM_STREAMING: "false"
    GITLAB_URL: "$CI_SERVER_URL"
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git
    - rm -rf /var/lib/apt/lists/*
    - test -n "$OPENAI_API_KEY" || (echo "OPENAI_API_KEY is required" && exit 1)
    - test -n "$GITLAB_KEY" || (echo "GITLAB_KEY is required" && exit 1)
    - mkdir -p "$CR_BIN_DIR"
    - |
      if [ -f "$CI_PROJECT_DIR/dist/cr" ]; then
        CR_BUILD_BIN="$CI_PROJECT_DIR/dist/cr"
      elif [ -f "$CI_PROJECT_DIR/cr-cli/dist/cr" ]; then
        CR_BUILD_BIN="$CI_PROJECT_DIR/cr-cli/dist/cr"
      else
        echo "Could not find cr binary artifact."
        exit 1
      fi
      cp "$CR_BUILD_BIN" "$CR_BIN_DIR/cr"
    - chmod +x "$CR_BIN_DIR/cr"
    - export PATH="$CR_BIN_DIR:$PATH"
  script:
    - |
      if [ -d "$CI_PROJECT_DIR/cr-cli" ] && [ -f "$CI_PROJECT_DIR/cr-cli/src/cli.ts" ]; then
        PROJECT_ROOT="$CI_PROJECT_DIR/cr-cli"
      else
        PROJECT_ROOT="$CI_PROJECT_DIR"
      fi
      cd "$PROJECT_ROOT"
      cr review --mode ci --path "$PROJECT_ROOT"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
