default:
  tags:
    - ubmcluster

stages:
  - build
  - review

build-pv-cli:
  stage: build
  image: oven/bun:1
  script:
    - |
      if [ -d "$CI_PROJECT_DIR/pv-cli" ] && [ -f "$CI_PROJECT_DIR/pv-cli/build.sh" ]; then
        PROJECT_ROOT="$CI_PROJECT_DIR/pv-cli"
      else
        PROJECT_ROOT="$CI_PROJECT_DIR"
      fi
      echo "Using project root: $PROJECT_ROOT"
      cd "$PROJECT_ROOT"
      bash build.sh
  artifacts:
    paths:
      - pv-cli-*.tar.gz
      - dist/pv
      - dist/pv.exe
      - pv-cli/pv-cli-*.tar.gz
      - pv-cli/dist/pv
      - pv-cli/dist/pv.exe
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

pv-review:
  stage: review
  image: oven/bun:1
  needs:
    - job: build-pv-cli
      artifacts: true
  variables:
    PV_BIN_DIR: "$CI_PROJECT_DIR/.pv-bin"
    OPENAI_API_URL: "https://codeassist.cr.otxlab.net/v1"
    OPENAI_MODEL: "gpt-4o"
    USE_CUSTOM_STREAMING: "false"
    GITLAB_URL: "$CI_SERVER_URL"
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git
    - rm -rf /var/lib/apt/lists/*
    - test -n "$OPENAI_API_KEY" || (echo "OPENAI_API_KEY is required" && exit 1)
    - test -n "$GITLAB_KEY" || (echo "GITLAB_KEY is required" && exit 1)
    - mkdir -p "$PV_BIN_DIR"
    - |
      if [ -f "$CI_PROJECT_DIR/dist/pv" ]; then
        PV_BUILD_BIN="$CI_PROJECT_DIR/dist/pv"
      elif [ -f "$CI_PROJECT_DIR/pv-cli/dist/pv" ]; then
        PV_BUILD_BIN="$CI_PROJECT_DIR/pv-cli/dist/pv"
      else
        echo "Could not find pv binary artifact."
        exit 1
      fi
      cp "$PV_BUILD_BIN" "$PV_BIN_DIR/pv"
    - chmod +x "$PV_BIN_DIR/pv"
    - export PATH="$PV_BIN_DIR:$PATH"
  script:
    - |
      if [ -d "$CI_PROJECT_DIR/pv-cli" ] && [ -f "$CI_PROJECT_DIR/pv-cli/src/cli.ts" ]; then
        PROJECT_ROOT="$CI_PROJECT_DIR/pv-cli"
      else
        PROJECT_ROOT="$CI_PROJECT_DIR"
      fi
      cd "$PROJECT_ROOT"
      pv review --mode ci --path "$PROJECT_ROOT"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
