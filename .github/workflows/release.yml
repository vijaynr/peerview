name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: bump
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)

          if [[ -z "$LATEST_TAG" ]]; then
            NEXT="0.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
            case "$BUMP" in
              major) NEXT="$((MAJOR + 1)).0.0" ;;
              minor) NEXT="$MAJOR.$((MINOR + 1)).0" ;;
              patch) NEXT="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
          fi

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

  build:
    name: Build (${{ matrix.platform }})
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: macos
            runner: macos-latest
          - platform: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build (Unix)
        if: matrix.platform != 'windows'
        run: bash build.sh

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: bash build.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pv-cli-${{ matrix.platform }}
          path: pv-cli-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  source:
    name: Package source
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          git archive --format=tar.gz --prefix="peerview-${VERSION}/" HEAD \
            -o "pv-source-${VERSION}.tar.gz"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pv-source
          path: pv-source-*.tar.gz
          if-no-files-found: error

  release:
    name: Create release
    needs: [version, build, source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.tar.gz' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: PeerView ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
